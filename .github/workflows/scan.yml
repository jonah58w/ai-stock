name: 每日台股掃描

on:
  schedule:
    # 台灣時間 16:00 = UTC 08:00(收盤後 30 分,資料已穩)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scanner.py 2>&1 | tee scanner.log

      - name: Upload scanner log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-log
          path: scanner.log
          retention-days: 7

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_scan.json data/scan_history.csv data/ai_learning.json || true
          git diff --staged --quiet || git commit -m "自動掃描結果 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
          git push
